<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>The Wedding Sridha — Indian Wedding Photography</title>

  <!-- SEO -->
  <meta name="description" content="Heirloom photography for Indian weddings. Editorial documentation of haldi, mehendi, sangeet, baraat, pheras, reception and intimate couple portraits — by The Wedding Sridha.">
  <meta name="theme-color" content="#D8E8E0">
  <meta name="author" content="The Wedding Sridha">
  <link rel="canonical" href="https://theweddingsridha.com/">

  <!-- Open Graph (so the page shows a real preview when shared on WhatsApp / Instagram / Facebook) -->
  <meta property="og:title" content="The Wedding Sridha — Indian Wedding Photography">
  <meta property="og:description" content="Editorial photography for Indian weddings. Bookings open for the season ahead.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://lh3.googleusercontent.com/d/1k1TyuJtbxEsozEYbiNMMLpIbIuxOsC4n=w1200">
  <meta property="og:url" content="https://theweddingsridha.com/">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="The Wedding Sridha — Indian Wedding Photography">
  <meta name="twitter:description" content="Editorial photography for Indian weddings.">
  <meta name="twitter:image" content="https://lh3.googleusercontent.com/d/1k1TyuJtbxEsozEYbiNMMLpIbIuxOsC4n=w1200">

  <!-- Structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ProfessionalService",
    "name": "The Wedding Sridha",
    "description": "Heirloom photography for Indian weddings",
    "image": "https://lh3.googleusercontent.com/d/1k1TyuJtbxEsozEYbiNMMLpIbIuxOsC4n=w1200",
    "url": "https://theweddingsridha.com/",
    "sameAs": ["https://instagram.com/theweddingsridha"],
    "priceRange": "On enquiry",
    "areaServed": "Worldwide"
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://images.pexels.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,300;1,400;1,500&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Hero image preload removed — the hero photo is data-driven (loaded
       from /api/content) so we can't statically preload the right URL
       at parse time. The browser fetches it as soon as main.js sets
       the background-image, and the loader screen covers the brief gap. -->

  <link rel="stylesheet" href="css/style.css">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' fill='%23D8E8E0'/><text x='50%25' y='62%25' text-anchor='middle' font-family='Georgia, serif' font-style='italic' font-size='36' fill='%232A4F44'>S</text></svg>">
</head>
<body>

  <a class="skip" href="#main">Skip to content</a>

  <!-- Loader -->
  <div class="loader" id="loader" aria-hidden="true">
    <div class="loader__inner">
      <div class="loader__mark" id="loaderMark">TWS</div>
      <div class="loader__line"></div>
      <div class="loader__name" id="loaderName">The Wedding Sridha</div>
    </div>
  </div>

  <!-- Custom cursor (only enabled when JS confirms desktop pointer) -->
  <div class="cursor" id="cursor" aria-hidden="true"></div>

  <!-- Top bar -->
  <header class="topbar" id="topbar" role="banner">
    <a class="topbar__brand" href="./" id="brand">
      <span>the wedding</span> <b>Sridha</b>
    </a>
    <nav class="topnav" aria-label="Primary">
      <div class="topnav__group" data-dropdown>
        <a href="#stories" class="topnav__trigger" aria-haspopup="true" aria-expanded="false">
          Stories <span class="topnav__caret" aria-hidden="true">▾</span>
        </a>
        <ul class="topnav__dropdown" id="storiesDropdown" role="menu" aria-label="Jump to a story"></ul>
      </div>
      <a href="#about">About</a>
      <a href="#contact" class="topnav__cta">Enquire</a>
    </nav>
  </header>

  <main id="main">

    <!-- Hero (rendered by main.js) -->
    <section id="hero" class="hero" data-render="hero" aria-labelledby="heroMark"></section>

    <!-- About -->
    <section id="about" class="section about" data-render="about" aria-label="About the photographer"></section>

    <!-- Stories — parent section that contains the intro, a tab bar
         (one tab per ritual), and the active ritual's gallery beneath.
         The 7 sub-stories live inside #storiesPanels as <article>s. -->
    <section id="stories" class="section stories" data-render="stories" aria-label="The stories"></section>

    <!-- Testimonials -->
    <section id="testimonials" class="section testimonials" data-render="testimonials" aria-label="Testimonials"></section>

    <!-- Contact (form) -->
    <section id="contact" class="section contact" data-render="contact" aria-label="Contact and enquiries"></section>

  </main>

  <!-- Footer -->
  <footer class="footer" id="footer" data-render="footer"></footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <span class="lightbox__counter" id="lbCounter"></span>
    <button class="lightbox__close" id="lbClose" aria-label="Close">×</button>
    <button class="lightbox__nav prev" id="lbPrev" aria-label="Previous photo">‹</button>
    <img class="lightbox__img" id="lbImg" alt="">
    <button class="lightbox__nav next" id="lbNext" aria-label="Next photo">›</button>
    <div class="lightbox__caption" id="lbCaption"></div>
  </div>

  <!-- Smooth scroll only — no GSAP, no ScrollTrigger needed for vertical layout -->
  <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js" defer></script>

  <!-- Font catalog (curated dropdown + Google Fonts URL helper) -->
  <script src="js/fonts.js" defer></script>

  <!-- Data + app: content-loader fetches /api/content (Netlify Blobs) and
       only then loads main.js. Cached copy in localStorage means repeat
       visits paint instantly, with a background revalidate. -->
  <script src="js/content-loader.js" data-mode="site" data-then="js/main.js" defer></script>
</body>
</html>
